<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ZAID BWP STOCK MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <!-- Apply theme before render to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('zaid_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="app-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <div>
          <div class="app-title">ZAID BWP STOCK MANAGER</div>
          <div class="app-subtitle">Admin Control Panel</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="/index.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Dashboard
        </a>
        <button class="btn btn-ghost btn-sm" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-container">
    <div class="admin-grid">
      <!-- 1. Items Management -->
      <section class="section-card" id="admin-items">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            Items Management
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('items')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Item
          </button>
        </div>
        <div class="add-form-panel" id="items-form-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Item Name *</label>
              <input type="text" class="form-input" id="items-name" placeholder="Enter item name">
            </div>
            <div class="form-group">
              <label class="form-label">Serial Number</label>
              <input type="text" class="form-input" id="items-number" placeholder="Optional">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Person Name</label>
              <input type="text" class="form-input" id="items-person" placeholder="Optional">
            </div>
            <div class="form-group">
              <label class="form-label">Model</label>
              <input type="text" class="form-input" id="items-model" placeholder="Optional">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('items')">Cancel</button>
            <button class="btn btn-primary btn-sm" id="items-submit">Add Item</button>
          </div>
        </div>
        <div class="section-body" id="items-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 2. Wallet Section -->
      <section class="section-card" id="admin-wallet">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
            Wallet
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('wallet')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
        <div class="add-form-panel" id="wallet-form-panel">
          <div class="type-toggle">
            <button class="type-toggle-btn active-in" id="wallet-type-in" onclick="setWalletType('in')">Money In</button>
            <button class="type-toggle-btn" id="wallet-type-out" onclick="setWalletType('out')">Money Out</button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" id="wallet-label">Person Name</label>
              <input type="text" class="form-input" id="wallet-person" placeholder="Person name">
            </div>
            <div class="form-group">
              <label class="form-label">Amount (Rs.)</label>
              <input type="number" class="form-input" id="wallet-amount" placeholder="0">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('wallet')">Cancel</button>
            <button class="btn btn-success btn-sm" id="wallet-submit">Save Entry</button>
          </div>
        </div>
        <div class="section-body" id="wallet-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 3. Person Details -->
      <section class="section-card" id="admin-person">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Person Details
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('person')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Worker
          </button>
        </div>
        <div class="add-form-panel" id="person-form-panel">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Worker Name *</label>
              <input type="text" class="form-input" id="person-name" placeholder="Enter worker name">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('person')">Cancel</button>
            <button class="btn btn-primary btn-sm" id="person-submit">Add Worker</button>
          </div>
        </div>
        <div class="section-body" id="person-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 4. Maintenance Section -->
      <section class="section-card" id="admin-maintenance">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            Maintenance
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('maintenance')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
        <div class="add-form-panel" id="maintenance-form-panel">
          <div class="category-grid" id="maintenance-categories">
            <button class="category-btn active" data-cat="Complaint">Complaint</button>
            <button class="category-btn" data-cat="Issue">Issue</button>
            <button class="category-btn" data-cat="Service">Service</button>
            <button class="category-btn" data-cat="Urgent Action">Urgent</button>
          </div>
          <div class="form-group">
            <label class="form-label">Subject *</label>
            <input type="text" class="form-input" id="maintenance-subject" placeholder="Brief subject">
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="maintenance-desc" placeholder="Detailed description..."></textarea>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('maintenance')">Cancel</button>
            <button class="btn btn-primary btn-sm" id="maintenance-submit">Add Entry</button>
          </div>
        </div>
        <div class="section-body" id="maintenance-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 5. Sample Management -->
      <section class="section-card" id="admin-samples">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6v7l5 8H4l5-8V3z"/><line x1="8" y1="3" x2="16" y2="3"/></svg>
            Sample Management
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('samples')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
        <div class="add-form-panel" id="samples-form-panel">
          <div class="type-toggle">
            <button class="type-toggle-btn active-in" id="samples-type-in" onclick="setSamplesType('in')">Sample In</button>
            <button class="type-toggle-btn" id="samples-type-out" onclick="setSamplesType('out')">Sample Out</button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Person Name *</label>
              <input type="text" class="form-input" id="samples-person" placeholder="Person name">
            </div>
            <div class="form-group">
              <label class="form-label">Program</label>
              <input type="text" class="form-input" id="samples-program" placeholder="Program name">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Pieces</label>
              <input type="text" class="form-input" id="samples-pieces" placeholder="Optional">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('samples')">Cancel</button>
            <button class="btn btn-success btn-sm" id="samples-submit">Save Entry</button>
          </div>
        </div>
        <div class="section-body" id="samples-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 6. Clipping Details -->
      <section class="section-card" id="admin-clipping">
        <div class="section-header">
          <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
            Clipping Details
          </div>
          <button class="btn btn-primary btn-sm" onclick="toggleForm('clipping')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
        <div class="add-form-panel" id="clipping-form-panel">
          <div class="type-toggle">
            <button class="type-toggle-btn active-in" id="clipping-type-in" onclick="setClippingType('in')">Clipped In</button>
            <button class="type-toggle-btn" id="clipping-type-out" onclick="setClippingType('out')">Out for Clipping</button>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Clipper Name *</label>
              <input type="text" class="form-input" id="clipping-name" placeholder="Clipper name">
            </div>
            <div class="form-group">
              <label class="form-label">Size *</label>
              <input type="text" class="form-input" id="clipping-size" placeholder="Size">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleForm('clipping')">Cancel</button>
            <button class="btn btn-success btn-sm" id="clipping-submit">Save Entry</button>
          </div>
        </div>
        <div class="section-body" id="clipping-body">
          <div class="loading-overlay"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>
    </div>
  </main>

  <!-- Global form toggle functions -->
  <script>
    function toggleForm(section) {
      const panel = document.getElementById(section + '-form-panel');
      panel.classList.toggle('active');
    }
    let walletType = 'in';
    window.walletType = 'in';
    function setWalletType(type) {
      walletType = type;
      window.walletType = type;
      document.getElementById('wallet-type-in').className = 'type-toggle-btn' + (type === 'in' ? ' active-in' : '');
      document.getElementById('wallet-type-out').className = 'type-toggle-btn' + (type === 'out' ? ' active-out' : '');
      document.getElementById('wallet-label').textContent = type === 'in' ? 'Person Name' : 'Used For';
    }
    let samplesType = 'in';
    window.samplesType = 'in';
    function setSamplesType(type) {
      samplesType = type;
      window.samplesType = type;
      document.getElementById('samples-type-in').className = 'type-toggle-btn' + (type === 'in' ? ' active-in' : '');
      document.getElementById('samples-type-out').className = 'type-toggle-btn' + (type === 'out' ? ' active-out' : '');
    }
    let clippingType = 'in';
    window.clippingType = 'in';
    function setClippingType(type) {
      clippingType = type;
      window.clippingType = type;
      document.getElementById('clipping-type-in').className = 'type-toggle-btn' + (type === 'in' ? ' active-in' : '');
      document.getElementById('clipping-type-out').className = 'type-toggle-btn' + (type === 'out' ? ' active-out' : '');
    }
    // Maintenance category
    document.querySelectorAll('#maintenance-categories .category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#maintenance-categories .category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

  <script type="module" src="/js/pages/admin.js"></script>
</body>
</html>
